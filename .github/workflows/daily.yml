name: Daily Immigration Intelligence Report

on:
  schedule:
    # Runs every day at 7:00 AM UTC (adjust to your preferred time)
    - cron: "0 7 * * *"
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the SQLite database from the previous run (so we remember past items)
      - name: Restore database
        uses: actions/cache@v4
        with:
          path: data/immigration.db
          key: immigration-db-${{ github.run_number }}
          restore-keys: |
            immigration-db-

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      # Save the updated database for the next run
      - name: Save database
        uses: actions/cache@v4
        if: always()
        with:
          path: data/immigration.db
          key: immigration-db-${{ github.run_number }}

      # Upload the HTML report as an artifact for review
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: immigration-report-${{ github.run_id }}
          path: output/report_*.html
          retention-days: 30
